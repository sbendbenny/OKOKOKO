<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康檢查預約系統</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        padding: 50px 20px;
    }
    .form-container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 460px;
    }
    h2 { text-align: center; color: #333; margin-bottom: 24px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    input[type="text"], select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
    }
    .checkbox-group {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px 14px;
    }
    .checkbox-group label {
        font-weight: normal;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        color: #333;
        cursor: pointer;
    }
    .checkbox-group label:last-child { margin-bottom: 0; }
    .checkbox-group input[type="checkbox"] { width: auto; cursor: pointer; }
    .hint { font-size: 13px; color: #888; margin-top: 4px; }
    button {
        width: 100%;
        padding: 12px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover:not(:disabled) { background-color: #45a049; }
    button:disabled { background-color: #aaa; cursor: not-allowed; }
    select:disabled { background-color: #eee; color: #999; }
</style>
</head>
<body>
<div class="form-container">
    <h2>健康檢查預約表</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label for="empCode">行名代號：</label>
            <input type="text" id="empCode" required placeholder="請輸入行名代號">
        </div>

        <div class="form-group">
            <label for="group">組別：</label>
            <select id="group" required>
                <option value="">請選擇組別</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dept">課別：</label>
            <select id="dept" required disabled>
                <option value="">請先選擇組別</option>
            </select>
        </div>

        <div class="form-group">
            <label>檢查項目（可多選）：</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="items" value="高溫健康檢查"> 高溫健康檢查</label>
                <label><input type="checkbox" name="items" value="粉塵健康檢查"> 粉塵健康檢查</label>
                <label><input type="checkbox" name="items" value="噪音健康檢查"> 噪音健康檢查</label>
                <label><input type="checkbox" name="items" value="一般健康檢查"> 一般健康檢查</label>
            </div>
        </div>

        <div class="form-group">
            <label for="date">預約日期：</label>
            <select id="date" required>
                <option value="">請選擇日期</option>
            </select>
        </div>

        <div class="form-group">
            <label for="slot">預約時段：</label>
            <select id="slot" required disabled>
                <option value="">請先選擇日期</option>
            </select>
            <div class="hint" id="slotHint"></div>
        </div>

        <button type="submit" id="submitBtn">送出預約</button>
    </form>
</div>

<script>
    // ─────────────────────────────────────────────
    // ⚙ 設定：填入你的 Google Apps Script Web App 
    // ─────────────────────────────────────────────
    const GOOGLE_SHEET_ = "https://script.google.com/macros/s/AKfycbyJUitz9dMEDbzpoQ3WkZFOgIqQPrIKpeipHl-L_3uUTjxyHL7FXOwi4ql5RAZyAZ8h/exec";

    // ====== 可預約日期區間 ======
    const START_DATE = "2026-09-30";
    const END_DATE   = "2026-10-31";

    // ====== 組別與課別對應表 ======
    const DEPT_MAP = {
        "運轉一組":       ["運轉一課", "運轉二課", "效率課"],
        "運轉二組":       ["運轉課", "效率課", "品核課"],
        "汽力機組值班":   ["汽力A班", "汽力B班", "汽力C班", "汽力D班"],
        "複循環機組值班": ["複循環機組值班A班", "複循環機組值班B班", "複循環機組值班C班", "複循環機組值班D班"],
        "新複循環值班":   ["新複循環值班A班", "新複循環值班B班", "新複循環值班C班", "新複循環值班D班"],
        "氣渦組":         ["氣渦一課", "氣渦二課"],
        "熱機組":         ["熱機一課", "熱機二課", "熱機三課", "熱機四課"],
        "鍋爐組":         ["廢熱鍋爐課", "鍋爐主機課", "鍋爐輔機課", "鍋爐FGD"],
        "汽機組":         ["汽機主機課", "汽機輔機課", "複汽課"],
        "電氣一組":       ["電器一課", "電器二課", "變電一課", "電機(一)課", "電機(二)課", "變電二課", "電氣課"],
        "電氣二組":       ["電器課", "變電課", "電機課"],
        "儀資一組":       ["儀資一課", "儀資二課", "儀資三課", "儀資四課", "儀資六課"],
        "儀資二組":       ["複儀一課", "複儀二課", "複儀三課", "複儀四課", "複儀五課"],
        "儀資三組":       ["儀資一課", "儀資二課", "儀資三課", "儀資四課"],
        "修配組":         ["修配課", "土木一課", "土木二課", "共設一課", "共設二課"],
        "機械組":         ["共同設備課", "廢熱鍋爐課", "土木課", "修配課"],
        "環保一組":       ["水處理課", "環保一課", "環保二課"],
        "環保二組":       ["化學課", "環保課", "水處理課", "生態課", "環境教育推廣課"],
        "工安組":         ["工安一課", "工安二課", "工安三課", "工安四課"],
        "供應組":         ["總務課", "管理課", "事務管理課", "材料一課", "材料二課", "材料三課", "採購課", "公關課"],
        "會計組":         ["編審課", "本成本課", "資材課", "複循環編審課"],
        "人資組":         ["人力運用課", "人力發展課"],
        "政風組":         ["政風查核課"],
        "儲運組":         ["碼頭營運課", "燃料營運課", "皮帶機械課", "堆取煤機課"]
    };

    const WEEKDAY_NAMES = ["日","一","二","三","四","五","六"];
    function pad(n){ return String(n).padStart(2,"0"); }

    // 產生區間內所有平日
    function generateWeekdayDates(startStr, endStr){
        const dates = [];
        const start = new Date(startStr + "T00:00:00");
        const end   = new Date(endStr   + "T00:00:00");
        let cur = new Date(start);
        while(cur <= end){
            const day = cur.getDay();
            if(day !== 0 && day !== 6){
                const ds = `${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`;
                dates.push({ value: ds, label: `${ds} (${WEEKDAY_NAMES[day]})` });
            }
            cur.setDate(cur.getDate()+1);
        }
        return dates;
    }

    // ====== 初始化組別 ======
    const groupSelect = document.getElementById('group');
    Object.keys(DEPT_MAP).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        groupSelect.appendChild(opt);
    });

    // ====== 初始化日期 ======
    const dateSelect = document.getElementById('date');
    generateWeekdayDates(START_DATE, END_DATE).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.value; opt.textContent = d.label;
        dateSelect.appendChild(opt);
    });

    // ====== 組別 → 課別 ======
    const deptSelect = document.getElementById('dept');
    groupSelect.addEventListener('change', () => {
        const group = groupSelect.value;
        deptSelect.innerHTML = '';
        if(!group){
            deptSelect.disabled = true;
            deptSelect.innerHTML = '<option value="">請先選擇組別</option>';
            return;
        }
        deptSelect.disabled = false;
        const ph = document.createElement('option');
        ph.value = ""; ph.textContent = "請選擇課別";
        deptSelect.appendChild(ph);
        DEPT_MAP[group].forEach(d => {
            const opt = document.createElement('option');
            opt.value = d; opt.textContent = d;
            deptSelect.appendChild(opt);
        });
    });

    // ====== 日期 → 查詢可預約時段 ======
    const slotSelect = document.getElementById('slot');
    const slotHint   = document.getElementById('slotHint');

    async function loadSlots(date){
        slotSelect.disabled = true;
        slotSelect.innerHTML = '<option>查詢可預約時段中...</option>';
        slotHint.textContent = '';
        try {
            const res    = await fetch(`${GOOGLE_SHEET_URL}?date=${date}`);
            const result = await res.json();
            slotSelect.innerHTML = '';
            if(result.status === "success" && result.slots.length > 0){
                const ph = document.createElement('option');
                ph.value = ""; ph.textContent = "請選擇時段";
                slotSelect.appendChild(ph);
                result.slots.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.slot;
                    opt.textContent = `${s.slot}（剩餘 ${s.remaining} 位）`;
                    slotSelect.appendChild(opt);
                });
                slotSelect.disabled = false;
            } else {
                slotSelect.innerHTML = '<option value="">此日期已無可預約時段</option>';
                slotHint.textContent = '請改選其他日期';
            }
        } catch(err){
            slotSelect.innerHTML = '<option value="">查詢失敗，請重新選擇日期</option>';
            slotHint.textContent = '網路連線錯誤：' + err;
        }
    }

    dateSelect.addEventListener('change', () => {
        const date = dateSelect.value;
        if(!date){
            slotSelect.disabled = true;
            slotSelect.innerHTML = '<option value="">請先選擇日期</option>';
            return;
        }
        loadSlots(date);
    });

    // ====== 送出表單 ======
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const empCode = document.getElementById('empCode').value.trim();
        const group   = groupSelect.value;
        const dept    = deptSelect.value;
        const date    = dateSelect.value;
        const slot    = slotSelect.value;
        const items   = Array.from(document.querySelectorAll('input[name="items"]:checked')).map(cb => cb.value);

        if(!slot)         { alert("請選擇預約時段"); return; }
        if(!items.length) { alert("請至少選擇一項檢查項目"); return; }

        submitBtn.disabled = true;
        submitBtn.innerText = "預約資料送出中，請稍候...";

        try {
            const res    = await fetch(GOOGLE_SHEET_URL, {
                method: "POST",
                body: JSON.stringify({ empCode, group, dept, items, date, slot })
            });
            const result = await res.json();
            if(result.status === "success"){
                alert("預約成功！");
                document.getElementById('bookingForm').reset();
                deptSelect.disabled = true;
                deptSelect.innerHTML = '<option value="">請先選擇組別</option>';
                slotSelect.disabled  = true;
                slotSelect.innerHTML = '<option value="">請先選擇日期</option>';
            } else {
                alert("發生錯誤：" + result.message);
                loadSlots(date);
            }
        } catch(err){
            alert("網路連線錯誤，請重試：" + err);
        } finally {
            submitBtn.disabled  = false;
            submitBtn.innerText = "送出預約";
        }
    });
</script>
</body>
</html>
