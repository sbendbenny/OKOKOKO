<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康檢查預約系統</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        padding: 50px 20px;
    }
    .form-container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 460px;
    }
    h2 { text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    input[type="text"], select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .checkbox-group {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px;
    }
    .checkbox-group label {
        font-weight: normal;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        color: #333;
    }
    .checkbox-group input[type="checkbox"] {
        width: auto;
    }
    .hint {
        font-size: 13px;
        color: #888;
        margin-top: 4px;
    }
    button {
        width: 100%;
        padding: 12px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:disabled { background-color: #aaa; cursor: not-allowed; }
    select:disabled { background-color: #eee; }
</style>
</head>
<body>

<div class="form-container">
    <h2>健康檢查預約表</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label for="empCode">行名代號：</label>
            <input type="text" id="empCode" required placeholder="請輸入行名代號">
        </div>

        <div class="form-group">
            <label for="group">組別：</label>
            <select id="group" required>
                <option value="">請選擇組別</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dept">課別：</label>
            <select id="dept" required disabled>
                <option value="">請先選擇組別</option>
            </select>
        </div>

        <div class="form-group">
            <label>檢查項目（可多選）：</label>
            <div class="checkbox-group" id="itemsGroup">
                <label><input type="checkbox" name="items" value="高溫健康檢查"> 高溫健康檢查</label>
                <label><input type="checkbox" name="items" value="粉塵健康檢查"> 粉塵健康檢查</label>
                <label><input type="checkbox" name="items" value="噪音健康檢查"> 噪音健康檢查</label>
                <label><input type="checkbox" name="items" value="一般健康檢查"> 一般健康檢查</label>
            </div>
        </div>

        <div class="form-group">
            <label for="date">預約日期：</label>
            <select id="date" required>
                <option value="">請選擇日期</option>
            </select>
        </div>

        <div class="form-group">
            <label for="slot">預約時段：</label>
            <select id="slot" required disabled>
                <option value="">請先選擇日期</option>
            </select>
            <div class="hint" id="slotHint"></div>
        </div>

        <button type="submit" id="submitBtn">送出預約</button>
    </form>
</div>

<script>
    // ─────────────────────────────────────────────
    // ⚙ 設定：填入你的 Google Apps Script Web App URL
    // ─────────────────────────────────────────────
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/library/d/1aS7elfrcmln28-StSgK447sPR3tKBuQAc_GJd9LeWNBO-zj2ZKc0v4i5/4";

    // ====== 可預約日期區間設定 ======
    const START_DATE = "2026-07-15";
    const END_DATE = "2026-08-30";

    // ====== 組別與課別對應表 ======
    // ⚠ 以下 6 個組別目前沒有指定下轄課別，暫以組別名稱代替，請依實際情況修改
    const DEPT_MAP = {
        "鍋爐組": ["廢鍋課", "鍋爐主機課", "鍋爐輔機課", "鍋爐FGD"],
        "電氣一組": ["電器一課", "電器二課", "變電一課", "電機(一)課", "電機(二)課", "變電二課", "電氣課"],
        "氣渦組": ["氣渦一課", "氣渦二課"],
        "機械組": ["共同設備課", "廢熱鍋爐課", "土木課", "修配課"],
        "修配組": ["修配課", "土木一課", "土木二課", "共設一課", "共設二課"],
        "運轉一組": ["運轉課", "效率課", "品核課"],
        "工安組": ["工安一課", "工安二課", "工安三課", "工安四課"],
        "儀資一組": ["儀資一組"],
        "儀資二組": ["儀資二組"],
        "儀資三組": ["儀資三組"],
        "政風組": ["政風組"],
        "會計組": ["會計組"],
        "供應組": ["供應組"]
    };

    const WEEKDAY_NAMES = ["日", "一", "二", "三", "四", "五", "六"];

    function pad(n) { return String(n).padStart(2, "0"); }

    // 產生 START_DATE ~ END_DATE 之間的所有平日（排除週六、週日）
    function generateWeekdayDates(startStr, endStr) {
        const dates = [];
        const start = new Date(startStr + "T00:00:00");
        const end = new Date(endStr + "T00:00:00");
        let cur = new Date(start);
        while (cur <= end) {
            const day = cur.getDay();
            if (day !== 0 && day !== 6) {
                const dateStr = `${cur.getFullYear()}-${pad(cur.getMonth() + 1)}-${pad(cur.getDate())}`;
                dates.push({ value: dateStr, label: `${dateStr} (${WEEKDAY_NAMES[day]})` });
            }
            cur.setDate(cur.getDate() + 1);
        }
        return dates;
    }

    // ====== 初始化組別下拉選單 ======
    const groupSelect = document.getElementById('group');
    Object.keys(DEPT_MAP).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        groupSelect.appendChild(opt);
    });

    // ====== 初始化日期下拉選單 ======
    const dateSelect = document.getElementById('date');
    generateWeekdayDates(START_DATE, END_DATE).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.value;
        opt.textContent = d.label;
        dateSelect.appendChild(opt);
    });

    // ====== 組別變動 -> 更新課別 ======
    const deptSelect = document.getElementById('dept');
    groupSelect.addEventListener('change', () => {
        const group = groupSelect.value;
        deptSelect.innerHTML = '';
        if (!group) {
            deptSelect.disabled = true;
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "請先選擇組別";
            deptSelect.appendChild(opt);
            return;
        }
        deptSelect.disabled = false;
        const placeholder = document.createElement('option');
        placeholder.value = "";
        placeholder.textContent = "請選擇課別";
        deptSelect.appendChild(placeholder);
        DEPT_MAP[group].forEach(dept => {
            const opt = document.createElement('option');
            opt.value = dept;
            opt.textContent = dept;
            deptSelect.appendChild(opt);
        });
    });

    // ====== 日期變動 -> 查詢該日可預約時段 ======
    const slotSelect = document.getElementById('slot');
    const slotHint = document.getElementById('slotHint');

    dateSelect.addEventListener('change', async () => {
        const date = dateSelect.value;
        slotSelect.innerHTML = '';
        slotHint.textContent = '';

        if (!date) {
            slotSelect.disabled = true;
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "請先選擇日期";
            slotSelect.appendChild(opt);
            return;
        }

        slotSelect.disabled = true;
        const loadingOpt = document.createElement('option');
        loadingOpt.textContent = "查詢可預約時段中...";
        slotSelect.appendChild(loadingOpt);

        try {
            const response = await fetch(`${GOOGLE_SHEET_URL}?date=${date}`);
            const result = await response.json();

            slotSelect.innerHTML = '';

            if (result.status === "success" && result.slots.length > 0) {
                const placeholder = document.createElement('option');
                placeholder.value = "";
                placeholder.textContent = "請選擇時段";
                slotSelect.appendChild(placeholder);

                result.slots.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.slot;
                    opt.textContent = `${s.slot}（剩餘 ${s.remaining} 位）`;
                    slotSelect.appendChild(opt);
                });
                slotSelect.disabled = false;
            } else {
                const opt = document.createElement('option');
                opt.value = "";
                opt.textContent = "此日期已無可預約時段";
                slotSelect.appendChild(opt);
                slotHint.textContent = "請改選其他日期";
            }
        } catch (error) {
            slotSelect.innerHTML = '';
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "查詢失敗，請重新選擇日期";
            slotSelect.appendChild(opt);
            slotHint.textContent = "網路連線錯誤：" + error;
        }
    });

    // ====== 送出表單 ======
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const empCode = document.getElementById('empCode').value;
        const group = groupSelect.value;
        const dept = deptSelect.value;
        const date = dateSelect.value;
        const slot = slotSelect.value;
        const items = Array.from(document.querySelectorAll('input[name="items"]:checked')).map(cb => cb.value);

        if (!slot) {
            alert("請選擇預約時段");
            return;
        }
        if (items.length === 0) {
            alert("請至少選擇一項檢查項目");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "預約資料送出中，請稍候...";

        const payload = { empCode, group, dept, items, date, slot };

        try {
            const response = await fetch(GOOGLE_SHEET_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.status === "success") {
                alert("預約成功！");
                document.getElementById('bookingForm').reset();
                deptSelect.disabled = true;
                deptSelect.innerHTML = '<option value="">請先選擇組別</option>';
                slotSelect.disabled = true;
                slotSelect.innerHTML = '<option value="">請先選擇日期</option>';
            } else {
                alert("發生錯誤：" + result.message);
                // 若時段被搶走，重新觸發日期變動以更新可預約時段
                dateSelect.dispatchEvent(new Event('change'));
            }
        } catch (error) {
            alert("網路連線錯誤，請重試：" + error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出預約";
        }
    });
</script>

</body>
</html>
